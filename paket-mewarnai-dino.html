<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>20 Halaman Mewarnai - Dinosaurus</title>
    <style>
        :root {
            --page-w: 210mm;
            --page-h: 297mm;
            --margin: 10mm;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #eee;
            color: #333;
            -webkit-font-smoothing: antialiased;
        }
        .toolbar {
            position: sticky;
            top: 0;
            z-index: 100;
            background: #2d3436;
            color: #fff;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            flex-wrap: wrap;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        .toolbar button {
            background: #6c5ce7;
            color: #fff;
            border: none;
            padding: 10px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            transition: all 0.2s;
        }
        .toolbar button:hover { background: #5a4bd1; transform: translateY(-1px); }
        .toolbar .count { color: #dfe6e9; font-size: 14px; }
        .page {
            width: var(--page-w);
            height: var(--page-h);
            margin: 16px auto;
            background: #fff;
            box-shadow: 0 2px 16px rgba(0,0,0,0.15);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            page-break-after: always;
            overflow: hidden;
        }
        .page:last-child { page-break-after: auto; }
        .page img {
            max-width: calc(var(--page-w) - 2 * var(--margin));
            max-height: calc(var(--page-h) - 2 * var(--margin) - 20mm);
            object-fit: contain;
            filter: grayscale(100%) contrast(1.2) brightness(1.05);
        }
        .page-footer {
            position: absolute;
            bottom: 8mm;
            font-size: 11px;
            color: #bbb;
            display: flex;
            gap: 30mm;
        }
        .page-num { color: #ccc; }
        @media print {
            body { background: #fff; }
            .toolbar { display: none !important; }
            .page {
                margin: 0 auto;
                box-shadow: none;
                width: 100%;
                height: 100vh;
                page-break-after: always;
            }
            .page:last-child { page-break-after: auto; }
            @page {
                size: A4;
                margin: 0;
            }
        }
        @media (max-width: 210mm) {
            .page {
                width: 100vw;
                height: auto;
                min-height: 100vw * 1.414;
                margin: 4px auto;
            }
        }
        .loading-text { text-align: center; padding: 60px 20px; font-size: 18px; color: #999; }
    </style>
</head>
<body>

<div class="toolbar">
    <span>🦕 <strong>Paket Mewarnai Dinosaurus</strong></span>
    <span class="count">13 halaman siap cetak</span>
    <button onclick="window.print()">🖨️ Print Semua (A4)</button>
</div>

<div id="pages-container">
    <div class="loading-text">⏳ Memuat halaman mewarnai...</div>
</div>

<script>
(function() {
    const images = [
        'cp_01.webp', 'cp_02.webp', 'cp_03.webp', 'cp_04.webp', 'cp_05.webp',
        'cp_06.jpg', 'cp_07.jpg', 'cp_08.jpg', 'cp_09.jpg', 'cp_10.jpg',
        'cp_11.jpg', 'cp_12.jpg', 'cp_13.jpg'
    ];
    
    const container = document.getElementById('pages-container');
    
    function createPage(imgSrc, index) {
        const page = document.createElement('div');
        page.className = 'page';
        
        const img = document.createElement('img');
        img.src = 'mewarnai-images/' + imgSrc;
        img.alt = 'Halaman Mewarnai ' + (index + 1);
        img.onerror = function() { this.style.display = 'none'; };
        
        const footer = document.createElement('div');
        footer.className = 'page-footer';
        footer.innerHTML = '<span>Mewarnai Dinosaurus 🦕</span><span class="page-num">Hlm ' + (index + 1) + '</span>';
        
        page.appendChild(img);
        page.appendChild(footer);
        return page;
    }
    
    // Clear and build all pages
    container.innerHTML = '';
    images.forEach(function(src, i) {
        container.appendChild(createPage(src, i));
    });
})();
</script>

</body>
</html>
